<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gestión de inventarios PROPLAS">

  <!-- Auto-actualización del service worker (versionado por hash de Flutter):
       cuando el navegador activa una versión NUEVA del service worker, la
       página se recarga sola UNA vez para mostrarla. Así el usuario siempre
       ve la última versión sin limpiar caché ni recargar a mano, y conserva
       la carga rápida y el funcionamiento sin conexión. -->
  <script>
    if ('serviceWorker' in navigator) {
      // ¿ya había una versión controlando la página al cargar?
      var teniaControlador = !!navigator.serviceWorker.controller;
      var recargando = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (recargando) return;
        // Solo recargar cuando es una ACTUALIZACIÓN (no la primera instalación),
        // para no entrar en un bucle de recargas en la primera visita.
        if (teniaControlador) {
          recargando = true;
          window.location.reload();
        }
      });
    }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Inventario PROPLAS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Inventario PROPLAS</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
